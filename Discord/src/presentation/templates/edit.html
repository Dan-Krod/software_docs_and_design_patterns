{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}?v=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}

{% block content %}
<div class="form-page-container">
    <div class="form-card">
        <header class="form-header">
            <h2 class="form-title">Налаштування</h2>
            <p class="form-subtitle">Редагування об'єкта <span class="server-id-tag">#{{ server.id }}</span></p>
        </header>

        <form method="POST" class="discord-form">
            <div class="form-group">
                <label for="name" class="form-label">Назва сервера</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-card"></i>
                    <input type="text" class="form-input" id="name" name="name" value="{{ server.name }}" required>
                </div>
            </div>
            
            <div class="form-group">
                <label for="invite_code" class="form-label">Інвайт-код</label>
                <div class="input-wrapper">
                    <i class="fas fa-key"></i>
                    <input type="text" class="form-input" id="invite_code" name="invite_code" value="{{ server.invite_code }}" required>
                </div>
            </div>

            <div class="form-group">
                <label for="member_count" class="form-label">Кількість учасників</label>
                <div class="input-wrapper">
                    <i class="fas fa-users"></i>
                    <input type="number" class="form-input" id="member_count" name="member_count" value="{{ server.member_count }}">
                </div>
            </div>
            
            <footer class="form-footer">
                <a href="{{ url_for('index') }}" class="btn-link">Скасувати</a>
                <button type="submit" class="btn-main">Зберегти зміни</button>
            </footer>
        </form>
    </div>
</div>
{% endblock %}
